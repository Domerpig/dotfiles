#--------------------------------------------------------------------------------------------------
# Powerline
#--------------------------------------------------------------------------------------------------
format = """
[](#63cdcf)\
$sudo\
$username\
[](bg:#c94f6d fg:#63cdcf)\
$directory\
[](fg:#c94f6d bg:#81B29A)\
$git_branch\
$git_status\
[](fg:#81B29A bg:#9D79D6)\
$nodejs\
$rust\
$python\
$package\
[](fg:#9D79D6 bg:#719CD6)\
$time\
[ ](fg:#719CD6)\
"""

# Disable the blank line at the start of the prompt
# add_newline = false

# You can also replace your username with a neat symbol like  to save some space
[username]
show_always = true
style_user = "bg:#63cdcf fg:#FFFFFF"
style_root = "bg:#63cdcf fg:#FFFFFF"
format = '[$user ]($style)'

[directory]
style = "bg:#c94f6d fg:#FFFFFF"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = " "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
"Source" = ""
# Keep in mind that the order matters. For example:
# "Important Documents" = "  "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important  " = "  "

[git_branch]
symbol = ""
style = "bg:#81B29A fg:#FFFFFF"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#81B29A fg:#FFFFFF"
format = '[($all_status$ahead_behind )]($style)'

[nodejs]
symbol = ""
style = "bg:#9D79D6 fg:#FFFFFF"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "bg:#9D79D6 fg:#FFFFFF"
format = '[ $symbol ($version) ]($style)'

[python]
symbol = ""
style = "bg:#9D79D6 fg:#FFFFFF"
format = '[ $symbol ($version) ($virtualenv) ]($style)'

[package]
symbol = ""
style = "bg:#9D79D6 fg:#FFFFFF"
format = '[$symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#719CD6 fg:#FFFFFF"
format = '[  $time ]($style)'
