#--------------------------------------------------------------------------------------------------
# Powerline
#--------------------------------------------------------------------------------------------------
format = """
[ŅéČ](#77E689)\
$sudo\
$username\
[Ņé░](bg:#56b6c2 fg:#77E689)\
$directory\
[Ņé░](fg:#56b6c2 bg:#cc3e44)\
$git_branch\
$git_status\
[Ņé░](fg:#cc3e44 bg:#528bff)\
$nodejs\
$rust\
$python\
$package\
[Ņé░](fg:#528bff bg:#e37933)\
$time\
[Ņé░ ](fg:#e37933)\
"""

# Disable the blank line at the start of the prompt
# add_newline = false

# You can also replace your username with a neat symbol like ’äĀ to save some space
[username]
show_always = true
style_user = "bg:#77E689"
style_root = "bg:#77E689"
format = '[$user ]($style)'

[directory]
style = "bg:#56b6c2"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "’£ś "
"Downloads" = "’ĆÖ "
"Music" = "’Ćü "
"Pictures" = "’ĆŠ "
"Source" = "’ćē"
# Keep in mind that the order matters. For example:
# "Important Documents" = " ’£ś’ä¬ "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important ’£ś " = " ’£ś’ä¬ "

[git_branch]
symbol = "’Éś"
style = "bg:#cc3e44"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#cc3e44"
format = '[($all_status$ahead_behind )]($style)'

[nodejs]
symbol = "Ņ£ś"
style = "bg:#528bff"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = "Ņ×©"
style = "bg:#528bff"
format = '[ $symbol ($version) ]($style)'

[python]
symbol = "ŅłĄ"
style = "bg:#528bff"
format = '[ $symbol ($version) ($virtualenv) ]($style)'

[package]
symbol = "’Æć"
style = "bg:#528bff"
format = '[$symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#e37933"
format = '[ ’ĆŚ $time ]($style)'
