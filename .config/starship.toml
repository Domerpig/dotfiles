#--------------------------------------------------------------------------------------------------
# Powerline
#--------------------------------------------------------------------------------------------------
format = """
[](#6dcbfa)\
$sudo\
$username\
[](bg:#f28779 fg:#6dcbfa)\
$directory\
[](fg:#f28779 bg:#a6cc70)\
$git_branch\
$git_status\
[](fg:#a6cc70 bg:#cfbafa)\
$nodejs\
$rust\
$python\
$package\
[](fg:#cfbafa bg:#ffcc66)\
$time\
[ ](fg:#ffcc66)\
"""

# Disable the blank line at the start of the prompt
# add_newline = false

# You can also replace your username with a neat symbol like  to save some space
[username]
show_always = true
style_user = "bg:#6dcbfa fg:#FFFFFF"
style_root = "bg:#6dcbfa fg:#FFFFFF"
format = '[$user ]($style)'

[directory]
style = "bg:#ed8274 fg:#FFFFFF"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = " "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
"Source" = ""
# Keep in mind that the order matters. For example:
# "Important Documents" = "  "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important  " = "  "

[git_branch]
symbol = ""
style = "bg:#a6cc70 fg:#FFFFFF"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#a6cc70 fg:#FFFFFF"
format = '[($all_status$ahead_behind )]($style)'

[nodejs]
symbol = ""
style = "bg:##cfbafa fg:#FFFFFF"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "bg:#cfbafa fg:#FFFFFF"
format = '[ $symbol ($version) ]($style)'

[python]
symbol = ""
style = "bg:#cfbafa fg:#FFFFFF"
format = '[ $symbol ($version) ($virtualenv) ]($style)'

[package]
symbol = ""
style = "bg:#cfbafa fg:#FFFFFF"
format = '[$symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#ffcc66 fg:#FFFFFF"
format = '[  $time ]($style)'
